<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Data Form</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Ensuring smooth transitions across all interactive elements */
        .hover-scale {
            transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.2s ease-in-out;
        }
        .hover-scale:hover {
            transform: scale(1.03);
        }
    </style>
</head>
<body class="bg-blue-100 min-h-screen flex flex-col justify-between items-center p-4 sm:p-8 font-sans text-gray-800">

    <!-- Spacer for flex alignment -->
    <div class="flex-grow flex items-center justify-center w-full mt-4 mb-8">
        
        <!-- Main Form Container -->
        <main class="w-full max-w-3xl bg-white rounded-3xl shadow-2xl p-6 sm:p-10 border border-blue-50">
            
            <!-- Thin Title -->
            <h1 class="text-4xl sm:text-5xl font-thin text-center text-blue-900 mb-10 tracking-wide">
                Personal Data Form
            </h1>
            
            <form id="personalForm" class="space-y-6">
                
                <!-- Full Name -->
                <div class="group">
                    <label for="fullName" class="block text-lg font-light text-gray-600 mb-2 group-focus-within:text-blue-600 transition-colors">Full Name</label>
                    <input type="text" id="fullName" name="fullName" required placeholder="e.g., John Doe"
                        class="w-full px-5 py-4 text-lg rounded-xl border border-gray-200 bg-gray-50 focus:bg-white focus:ring-4 focus:ring-blue-200 focus:border-blue-400 outline-none hover-scale">
                </div>

                <!-- Email & Phone Row -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="group">
                        <label for="email" class="block text-lg font-light text-gray-600 mb-2 group-focus-within:text-blue-600 transition-colors">Email Address</label>
                        <input type="email" id="email" name="email" required placeholder="john@example.com"
                            class="w-full px-5 py-4 text-lg rounded-xl border border-gray-200 bg-gray-50 focus:bg-white focus:ring-4 focus:ring-blue-200 focus:border-blue-400 outline-none hover-scale">
                    </div>
                    
                    <div class="group">
                        <label for="phone" class="block text-lg font-light text-gray-600 mb-2 group-focus-within:text-blue-600 transition-colors">Phone Number</label>
                        <input type="tel" id="phone" name="phone" required placeholder="+1 (555) 000-0000"
                            class="w-full px-5 py-4 text-lg rounded-xl border border-gray-200 bg-gray-50 focus:bg-white focus:ring-4 focus:ring-blue-200 focus:border-blue-400 outline-none hover-scale">
                    </div>
                </div>

                <!-- Date of Birth & Address Row -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="group">
                        <label for="dob" class="block text-lg font-light text-gray-600 mb-2 group-focus-within:text-blue-600 transition-colors">Date of Birth</label>
                        <input type="date" id="dob" name="dob" required
                            class="w-full px-5 py-4 text-lg rounded-xl border border-gray-200 bg-gray-50 focus:bg-white focus:ring-4 focus:ring-blue-200 focus:border-blue-400 outline-none hover-scale">
                    </div>

                    <div class="group">
                        <label for="address" class="block text-lg font-light text-gray-600 mb-2 group-focus-within:text-blue-600 transition-colors">Home Address</label>
                        <input type="text" id="address" name="address" required placeholder="123 Main St, City"
                            class="w-full px-5 py-4 text-lg rounded-xl border border-gray-200 bg-gray-50 focus:bg-white focus:ring-4 focus:ring-blue-200 focus:border-blue-400 outline-none hover-scale">
                    </div>
                </div>

                <!-- Custom Message Box (Hidden by default) -->
                <div id="messageBox" class="hidden text-center py-4 px-6 rounded-xl font-medium text-lg transition-all duration-300"></div>

                <!-- Large Buttons Container -->
                <div class="flex flex-col sm:flex-row gap-4 pt-6">
                    
                    <!-- Random Data Button (Green) -->
                    <button type="button" onclick="fillRandomData()" 
                        class="flex-1 bg-green-500 hover:bg-green-600 text-white py-4 px-6 rounded-2xl text-xl font-medium shadow-lg hover:shadow-xl hover-scale flex items-center justify-center gap-2">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z" />
                        </svg>
                        Random Data
                    </button>

                    <!-- Submit Button (Green) -->
                    <button type="submit" 
                        class="flex-1 bg-green-600 hover:bg-green-700 text-white py-4 px-6 rounded-2xl text-xl font-medium shadow-lg hover:shadow-xl hover-scale flex items-center justify-center gap-2">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
                        </svg>
                        Submit Form
                    </button>

                    <!-- Clear Button (Red) -->
                    <button type="reset" onclick="hideMessage()"
                        class="flex-1 sm:flex-none sm:w-1/4 bg-red-500 hover:bg-red-600 text-white py-4 px-6 rounded-2xl text-xl font-medium shadow-lg hover:shadow-xl hover-scale flex items-center justify-center gap-2">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                        </svg>
                        Clear
                    </button>
                </div>
            </form>
        </main>
    </div>

    <!-- Required Footer Header -->
    <footer class="w-full text-center py-6 px-4">
        <p class="text-blue-900 font-light text-base sm:text-lg tracking-wide opacity-80">
            All rights are reserved to Dr. Mazen Badawy – Doctorate of English Teaching & Testing
        </p>
    </footer>

    <script>
        // Random Data Generator Logic
        const firstNames = ["Ahmed", "Sarah", "Mohamed", "Emily", "Omar", "Jessica", "Ali", "David", "Youssef", "Maria"];
        const lastNames = ["Smith", "Hassan", "Johnson", "Ibrahim", "Williams", "Mahmoud", "Brown", "Ali", "Taylor", "Mostafa"];
        const domains = ["gmail.com", "yahoo.com", "outlook.com", "example.edu", "company.org"];
        const streets = ["123 Maple St", "456 Oak Ave", "789 Pine Rd", "321 Elm St", "654 Cedar Ln"];
        const cities = ["New York", "Cairo", "London", "Dubai", "Toronto"];

        function getRandomItem(array) {
            return array[Math.floor(Math.random() * array.length)];
        }

        function generateRandomPhone() {
            const countryCode = "+1"; // Defaulting to an example country code format
            const part1 = Math.floor(Math.random() * 900) + 100; // 100-999
            const part2 = Math.floor(Math.random() * 900) + 100; // 100-999
            const part3 = Math.floor(Math.random() * 9000) + 1000; // 1000-9999
            return `${countryCode} (${part1}) ${part2}-${part3}`;
        }

        function generateRandomDate() {
            const start = new Date(1970, 0, 1);
            const end = new Date(2005, 11, 31);
            const date = new Date(start.getTime() + Math.random() * (end.getTime() - start.getTime()));
            return date.toISOString().split('T')[0];
        }

        function fillRandomData() {
            const firstName = getRandomItem(firstNames);
            const lastName = getRandomItem(lastNames);
            
            document.getElementById('fullName').value = `${firstName} ${lastName}`;
            document.getElementById('email').value = `${firstName.toLowerCase()}.${lastName.toLowerCase()}${Math.floor(Math.random()*100)}@${getRandomItem(domains)}`;
            document.getElementById('phone').value = generateRandomPhone();
            document.getElementById('dob').value = generateRandomDate();
            document.getElementById('address').value = `${getRandomItem(streets)}, ${getRandomItem(cities)}`;
            
            // Give a slight visual cue that data was generated
            showMessage('Random data generated successfully!', 'bg-blue-100 text-blue-800 border border-blue-200');
        }

        function showMessage(text, classes) {
            const msgBox = document.getElementById('messageBox');
            msgBox.textContent = text;
            msgBox.className = `mt-4 text-center py-4 px-6 rounded-xl font-medium text-lg transition-all duration-300 block ${classes}`;
            
            // Auto hide message after 3 seconds
            setTimeout(hideMessage, 3000);
        }

        function hideMessage() {
            const msgBox = document.getElementById('messageBox');
            msgBox.classList.add('hidden');
        }

        // Handle form submission to Google Sheets
        document.getElementById('personalForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            // IMPORTANT: You cannot use the Google Sheet URL here.
            // Paste the resulting "https://script.google.com/macros/s/..." Web App URL below:
            const scriptURL = 'YOUR_WEB_APP_URL_HERE';
            
            if (scriptURL === 'YOUR_WEB_APP_URL_HERE' || scriptURL.includes('docs.google.com')) {
                showMessage('Error: Please replace the placeholder with your Apps Script Web App URL, not the Sheet URL.', 'bg-red-100 text-red-800 border border-red-200');
                return;
            }

            const form = document.forms['personalForm'];
            const submitButton = form.querySelector('button[type="submit"]');
            const originalButtonText = submitButton.innerHTML;
            
            // Show loading state and disable button
            submitButton.innerHTML = `
                <svg class="animate-spin h-6 w-6 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg> Submitting...`;
            submitButton.disabled = true;

            // Send data using FormData
            fetch(scriptURL, { method: 'POST', body: new FormData(form) })
                .then(response => {
                    showMessage('Form submitted successfully to Google Sheets!', 'bg-green-100 text-green-800 border border-green-200');
                    form.reset();
                    submitButton.innerHTML = originalButtonText;
                    submitButton.disabled = false;
                })
                .catch(error => {
                    console.error('Error!', error.message);
                    showMessage('Error submitting form. Please check your connection.', 'bg-red-100 text-red-800 border border-red-200');
                    submitButton.innerHTML = originalButtonText;
                    submitButton.disabled = false;
                });
        });
    </script>
</body>
</html>
