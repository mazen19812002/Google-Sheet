<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Data Form & Report</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Hover scale transitions for interactive elements */
        .hover-scale {
            transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.2s ease-in-out;
        }
        .hover-scale:hover {
            transform: scale(1.05);
        }

        /* Print Specific Layout logic */
        @media print {
            body * { visibility: hidden; }
            #printReportContainer, #printReportContainer * { visibility: visible; }
            #printReportContainer {
                position: absolute;
                left: 0;
                top: 0;
                width: 100%;
                padding: 0;
            }
            .no-print { display: none !important; }
        }
    </style>
</head>
<body class="bg-blue-100 min-h-screen flex flex-col font-sans text-gray-800">

    <!-- Form Section - Hidden during printing -->
    <div class="flex-grow flex items-center justify-center p-4 sm:p-8 no-print">
        <main class="w-full max-w-4xl bg-white rounded-3xl shadow-2xl p-6 sm:p-12 border border-blue-50">
            
            <h1 class="text-4xl sm:text-5xl font-thin text-center text-blue-900 mb-12 tracking-tight">
                Personal Data Form
            </h1>
            
            <form id="personalForm" class="space-y-8">
                <!-- Full Name Field -->
                <div class="group">
                    <label class="block text-xl font-light text-gray-500 mb-2">Full Name</label>
                    <input type="text" name="fullName" required placeholder="Enter full name"
                        class="w-full px-6 py-4 text-xl rounded-2xl border border-gray-200 bg-gray-50 focus:bg-white focus:ring-4 focus:ring-blue-200 outline-none hover-scale">
                </div>

                <!-- Email & Phone Number Row -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                    <div class="group">
                        <label class="block text-xl font-light text-gray-500 mb-2">Email Address</label>
                        <input type="email" name="email" required placeholder="email@example.com"
                            class="w-full px-6 py-4 text-xl rounded-2xl border border-gray-200 bg-gray-50 focus:bg-white focus:ring-4 focus:ring-blue-200 outline-none hover-scale">
                    </div>
                    <div class="group">
                        <label class="block text-xl font-light text-gray-500 mb-2">Phone Number</label>
                        <input type="tel" name="phone" required placeholder="Phone number"
                            class="w-full px-6 py-4 text-xl rounded-2xl border border-gray-200 bg-gray-50 focus:bg-white focus:ring-4 focus:ring-blue-200 outline-none hover-scale">
                    </div>
                </div>

                <!-- DOB & Address Row -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                    <div class="group">
                        <label class="block text-xl font-light text-gray-500 mb-2">Date of Birth</label>
                        <input type="date" name="dob" required
                            class="w-full px-6 py-4 text-xl rounded-2xl border border-gray-200 bg-gray-50 focus:bg-white focus:ring-4 focus:ring-blue-200 outline-none hover-scale">
                    </div>
                    <div class="group">
                        <label class="block text-xl font-light text-gray-500 mb-2">Address</label>
                        <input type="text" name="address" required placeholder="Full address"
                            class="w-full px-6 py-4 text-xl rounded-2xl border border-gray-200 bg-gray-50 focus:bg-white focus:ring-4 focus:ring-blue-200 outline-none hover-scale">
                    </div>
                </div>

                <!-- Feedback Message Container -->
                <div id="messageBox" class="hidden text-center py-4 px-6 rounded-2xl font-medium text-lg transition-all"></div>

                <!-- Action Buttons -->
                <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 pt-6">
                    <button type="button" onclick="fillRandomData()" 
                        class="bg-green-500 hover:bg-green-600 text-white py-5 rounded-2xl text-xl font-bold shadow-lg hover-scale">
                        Random Data
                    </button>

                    <button type="submit" 
                        class="bg-green-600 hover:bg-green-700 text-white py-5 rounded-2xl text-xl font-bold shadow-lg hover-scale">
                        Submit Data
                    </button>

                    <button type="button" id="printBtn" onclick="fetchAndPrintReport()"
                        class="bg-green-500 hover:bg-green-600 text-white py-5 rounded-2xl text-xl font-bold shadow-lg hover-scale">
                        Print Report
                    </button>

                    <button type="reset" onclick="hideMessage()"
                        class="bg-red-500 hover:bg-red-600 text-white py-5 rounded-2xl text-xl font-bold shadow-lg hover-scale">
                        Clear Form
                    </button>
                </div>
            </form>
        </main>
    </div>

    <!-- Hidden Print Container - Only visible during print window -->
    <div id="printReportContainer" class="hidden p-10 bg-white">
        <h1 class="text-4xl font-thin text-center text-blue-900 mb-8 border-b pb-4">Personal Data Report</h1>
        <div id="tableTarget"></div>
        <div class="mt-10 text-center text-gray-400 font-light border-t pt-6 italic">
            Report generated on: <span id="genDate"></span>
        </div>
        <div class="mt-6 text-center text-lg font-bold text-blue-900">
            All rights are reserved to Dr. Mazen Badawy – Doctorate of English Teaching & Testing
        </p>
    </div>

    <!-- Persistent Footer -->
    <footer class="w-full text-center py-8 px-4 no-print bg-white/50 backdrop-blur-sm border-t border-blue-100">
        <p class="text-blue-900 font-light text-lg tracking-wide">
            All rights are reserved to Dr. Mazen Badawy – Doctorate of English Teaching & Testing
        </p>
    </footer>

    <script>
        // Updated Google Apps Script Web App URL
        const scriptURL = 'https://script.google.com/macros/s/AKfycbxFzhUvqMIjx3g2o4RFxCH0DTI9JPkb57oJ1hB1psgiMXsAchEms5O0RMw-5ZwK7M4jaw/exec';

        // Sample Data Lists for Random Generation
        const fn = ["Ahmed", "Mazen", "Sarah", "Laila", "Omar", "Youssef", "Mariam", "Zaid"];
        const ln = ["Badawy", "Hassan", "Ali", "Smith", "Mansour", "Ibrahim", "Abdelaziz", "Fahmy"];
        
        function fillRandomData() {
            const f = fn[Math.floor(Math.random()*fn.length)];
            const l = ln[Math.floor(Math.random()*ln.length)];
            const form = document.getElementById('personalForm');
            form.fullName.value = f + " " + l;
            form.email.value = f.toLowerCase() + "." + l.toLowerCase() + Math.floor(Math.random()*100) + "@example.com";
            form.phone.value = "+20 1" + Math.floor(100000000 + Math.random() * 900000000);
            form.dob.value = (1970 + Math.floor(Math.random()*35)) + "-0" + (Math.floor(Math.random()*9)+1) + "-15";
            form.address.value = Math.floor(Math.random()*150) + " Educational District, Cairo";
            showMessage('Sample data loaded successfully.', 'bg-blue-100 text-blue-800');
        }

        function showMessage(t, c) {
            const b = document.getElementById('messageBox');
            b.textContent = t;
            b.className = `block mt-4 py-4 px-6 rounded-2xl font-medium text-lg ${c}`;
            setTimeout(() => b.classList.add('hidden'), 5000);
        }

        function hideMessage() { document.getElementById('messageBox').classList.add('hidden'); }

        // POST Data Submission
        document.getElementById('personalForm').addEventListener('submit', e => {
            e.preventDefault();
            const btn = e.target.querySelector('button[type="submit"]');
            const originalText = btn.textContent;
            btn.disabled = true;
            btn.textContent = "Processing...";

            fetch(scriptURL, { method: 'POST', body: new FormData(e.target)})
                .then(() => {
                    showMessage('Success! Personal data saved to the database.', 'bg-green-100 text-green-800');
                    e.target.reset();
                })
                .catch(() => showMessage('Error: Connection failed. Check your script deployment.', 'bg-red-100 text-red-800'))
                .finally(() => {
                    btn.disabled = false;
                    btn.textContent = originalText;
                });
        });

        // GET Data & Print Report
        function fetchAndPrintReport() {
            const btn = document.getElementById('printBtn');
            const originalText = btn.textContent;
            btn.disabled = true;
            btn.textContent = "Fetching...";

            fetch(scriptURL)
                .then(r => r.json())
                .then(data => {
                    if(!data || data.length === 0) {
                        showMessage('No records found in the database.', 'bg-yellow-100 text-yellow-800');
                        return;
                    }
                    
                    // Construct printable table
                    let html = '<table class="w-full border-collapse border border-gray-200"><thead><tr class="bg-gray-100">';
                    Object.keys(data[0]).forEach(h => html += `<th class="border border-gray-300 p-3 text-left font-bold text-gray-700">${h}</th>`);
                    html += '</tr></thead><tbody>';
                    data.forEach(row => {
                        html += '<tr class="hover:bg-gray-50">';
                        Object.values(row).forEach(v => html += `<td class="border border-gray-300 p-3 text-gray-600">${v}</td>`);
                        html += '</tr>';
                    });
                    html += '</tbody></table>';

                    document.getElementById('tableTarget').innerHTML = html;
                    document.getElementById('genDate').innerText = new Date().toLocaleString();
                    
                    // Trigger native print
                    window.print();
                })
                .catch(() => showMessage('Failed to fetch data. Ensure doGet is implemented in script.', 'bg-red-100 text-red-800'))
                .finally(() => {
                    btn.disabled = false;
                    btn.textContent = originalText;
                });
        }
    </script>
</body>
</html>
